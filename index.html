<!DOCTYPE html>
<html>
<head>
<title>Handwriting AI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
function previewImage(event) {
    const image = document.getElementById("preview");
    image.src = URL.createObjectURL(event.target.files[0]);
    image.style.display = "block";
}
</script>

</head>

<body>

<div class="container">

<h1>✍ Handwriting Style Classifier</h1>

<p>Capture or upload handwriting to detect style</p>

<form action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="image" accept="image/*" capture="environment" onchange="previewImage(event)">

<br><br>

<img id="preview" style="display:none;" width="200"/>

<br><br>

<button type="submit">Analyze Handwriting</button>

</form>

</div>

</body>
</html>
{% if result %}
<h3>🧠 Prediction: {{ result }}</h3>
{% endif %}
